{% extends 'base.html' %} {% load static %} {% block content %}
<section
  class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12"
>
  <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl p-10">
    <div class="mb-8">
      <h2 class="text-2xl font-bold text-text-dark">Create Your Account</h2>
      <p class="text-gray-500 text-sm mt-1">Step 2 of 5</p>
    </div>

    <form class="space-y-6" method="POST" {% if request.path == '/farmmer/registration' %} action="/farmmer/farmdetails" {% else %} action="/buyer/buyerdetails" {% endif %}>
      {% csrf_token %}
      <div>
        <label class="text-sm font-medium text-gray-700">Full Name</label>
        <input
          type="text"
          class="w-full mt-2 rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-primary"
        />
      </div>

      <div>
        <label class="text-sm font-medium text-gray-700">Mobile Number</label>
        <input
          type="tel"
          class="w-full mt-2 rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-primary"
        />
      </div>

      <div>
        <label class="text-sm font-medium text-gray-700">Email</label>
        <input
          type="email"
          class="w-full mt-2 rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-primary"
        />
      </div>

      <div>
        <label class="text-sm font-medium text-gray-700">Password</label>
        <input
          type="password"
          class="w-full mt-2 rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-primary"
        />
      </div>
     
      <button
        type="method"
        class="block w-full bg-primary text-white py-3 rounded-lg font-bold text-center hover:bg-primary-dark transition"
      >
        Continue
    </button>
    </form>
  </div>
</section>
{% endblock %}
