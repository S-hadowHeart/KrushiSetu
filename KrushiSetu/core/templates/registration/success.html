{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12">
  <div class="max-w-lg w-full bg-white rounded-2xl shadow-xl p-10 text-center">

    <div class="text-primary mb-6">
      <span class="material-symbols-outlined text-6xl">check_circle</span>
    </div>

    <h2 class="text-2xl font-bold text-text-dark mb-2">
      Registration Successful!
    </h2>

    <p class="text-gray-500 text-sm mb-6">
      Your account is under review. You will receive confirmation once verified.
    </p>

    <button class="bg-primary text-white px-6 py-3 rounded-lg font-bold hover:bg-primary-dark transition">
      Go to Dashboard
    </button>

  </div>
</section>

{% endblock %}
