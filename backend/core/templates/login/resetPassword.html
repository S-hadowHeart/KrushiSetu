{% extends 'base.html' %}
{% load static %}
{% block content %}
<section class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

    <h2 class="text-2xl font-bold text-text-dark text-center mb-6">
      Reset Password
    </h2>

    <form method="POST">
      {% csrf_token %}

      <div class="mb-4">
        <label class="text-sm font-medium text-gray-700">
          New Password
        </label>
        <input type="password"
          name="password1"
          class="w-full mt-2 rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-primary"
          required>
      </div>

      <div class="mb-6">
        <label class="text-sm font-medium text-gray-700">
          Confirm Password
        </label>
        <input type="password"
          name="password2"
          class="w-full mt-2 rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-primary"
          required>
      </div>

      <button type="submit"
        class="w-full bg-primary hover:bg-primary-dark text-white py-3 rounded-lg font-bold">
        Update Password
      </button>

    </form>

  </div>
</section>
{% endblock %}
