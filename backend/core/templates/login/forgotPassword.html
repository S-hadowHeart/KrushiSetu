{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

    <div class="text-center mb-6">
      <h2 class="text-2xl font-bold text-text-dark">
        Forgot Password?
      </h2>
      <p class="text-gray-500 text-sm mt-1">
        Enter your registered email or mobile number
      </p>
    </div>

    <form method="POST" action="otp">
      {% csrf_token %}

      <div class="mb-6">
        <label class="text-sm font-medium text-gray-700">
          Email or Mobile
        </label>
        <input type="text"
          name="identifier"
          class="w-full mt-2 rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-primary"
          placeholder="example@email.com or 9876543210"
          required>
      </div>

      <button type="submit"
        class="w-full bg-primary hover:bg-primary-dark text-white py-3 rounded-lg font-bold transition">
        Send OTP
      </button>
    </form>

    <div class="text-center mt-6 text-sm">
      <a href="/login" class="text-primary-dark font-medium hover:underline">
        Back to Login
      </a>
    </div>

  </div>
</section>
{% endblock %}
