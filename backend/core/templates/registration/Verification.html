{% extends 'base.html' %} {% load static %} {% block content %}
<section
  class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12"
>
<div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl p-10 text-center">
  <form method="POST" action="/registration/success" >
      {% csrf_token %}
    <h2 class="text-2xl font-bold text-text-dark mb-2">
      Identity Verification
    </h2>
    <p class="text-gray-500 text-sm mb-8">
      Upload Aadhar Card or Kisan Card for secure trading.
    </p>

    <div
      class="border-2 border-dashed border-gray-300 rounded-xl p-8 hover:border-primary transition cursor-pointer"
    >
      <span class="material-symbols-outlined text-5xl text-gray-400"
        >upload</span
      >
      <p class="text-gray-500 text-sm mt-2">Click to upload document</p>
    </div>

    <button
      type="submit"
      class="block w-full bg-primary text-white py-3 rounded-lg font-bold text-center hover:bg-primary-dark transition"
    >
      Submit for Approval
  </button>
</form>
  </div>
</section>
{% endblock %}
