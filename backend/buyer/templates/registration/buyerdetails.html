{% extends 'base.html' %}

{% load static %}

{% block content %}
<section class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12">
  <div class="w-full max-w-3xl bg-white rounded-2xl shadow-xl p-10">

    <!-- Header -->
    <div class="mb-8">
      <h2 class="text-2xl font-bold text-text-dark">
        Business Details
      </h2>
      <p class="text-gray-500 text-sm mt-1">
        Step 3 of 5 – Help sellers trust your business
      </p>
    </div>

    <form class="grid md:grid-cols-2 gap-6" method="POST" action="/buyer/verification">
      {% csrf_token %}

      <!-- Business Name -->
      <div class="md:col-span-2">
        <label class="text-sm font-medium text-gray-700">
          Business / Company Name
        </label>
        <input type="text"
          class="w-full mt-2 rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-primary focus:border-primary"
          placeholder="e.g., Shree Ganesh Cotton Mills Pvt Ltd">
      </div>

      <!-- Business Type -->
      <div>
        <label class="text-sm font-medium text-gray-700">
          Business Type
        </label>
        <select
          class="w-full mt-2 rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-primary">
          <option>Select Type</option>
          <option>Hotel / Restaurant</option>
          <option>Manufacturer</option>
          <option>Retailer</option>
          <option>Wholesaler</option>
          <option>Exporter</option>
          <option>NGO</option>
          <option>Other</option>
        </select>
      </div>

      <!-- Years in Operation -->
      <div>
        <label class="text-sm font-medium text-gray-700">
          Years in Operation
        </label>
        <input type="number"
          class="w-full mt-2 rounded-lg border border-gray-300 px-4 py-3"
          placeholder="e.g., 5">
      </div>

      <!-- Business Location -->
      <div>
        <label class="text-sm font-medium text-gray-700">
          Business Location (City)
        </label>
        <input type="text"
          class="w-full mt-2 rounded-lg border border-gray-300 px-4 py-3"
          placeholder="e.g., Rajkot, Gujarat">
      </div>

      <!-- GST Number -->
      <div>
        <label class="text-sm font-medium text-gray-700">
          GST Number (Optional)
        </label>
        <input type="text"
          class="w-full mt-2 rounded-lg border border-gray-300 px-4 py-3"
          placeholder="Enter GSTIN if applicable">
      </div>

      <!-- Monthly Purchase Volume -->
      <div>
        <label class="text-sm font-medium text-gray-700">
          Approx. Monthly Purchase Volume
        </label>
        <select
          class="w-full mt-2 rounded-lg border border-gray-300 px-4 py-3">
          <option>Select Volume</option>
          <option>Less than 10 Quintals</option>
          <option>10 – 50 Quintals</option>
          <option>50 – 200 Quintals</option>
          <option>200+ Quintals</option>
        </select>
      </div>

      <!-- Preferred Crops -->
      <div>
        <label class="text-sm font-medium text-gray-700">
          Preferred Crops
        </label>
        <input type="text"
          class="w-full mt-2 rounded-lg border border-gray-300 px-4 py-3"
          placeholder="e.g., Wheat, Cotton, Groundnut">
      </div>

      <!-- Continue Button -->
      <div class="md:col-span-2 pt-4">
        <button
          type='submit'
          class="w-full bg-primary hover:bg-primary-dark text-white py-3 rounded-lg font-bold shadow-lg transition-all">
          Continue to Verification
        </button>
      </div>

    </form>

  </div>
</section>
{% endblock %}
